<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PS4 Controller – Android Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   rgba(255,255,255,0.05);
    --rim:       rgba(255,255,255,0.10);
    --accent:    #00c6ff;
    --cross:     #5b9cf6;
    --circle:    #f06292;
    --square:    #e57ef0;
    --triangle:  #5dde90;
    --dpad:      #cfd8dc;
    --text:      #9eaab8;
    --label:     rgba(255,255,255,0.55);
    --btn-glow:  rgba(0,198,255,0.25);
    --touch-sz:  52px;   /* minimum tap target */
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── GAME AREA ─────────────────────────────────── */
  #game-area {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #1a1d2e 0%, #0d0f14 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #screen-label {
    color: rgba(255,255,255,0.08);
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── CONTROLLER SHELL ──────────────────────────── */
  #controller {
    position: absolute;
    inset: 0;
    pointer-events: none;          /* children opt-in */
  }

  /* ── SHARED BUTTON STYLES ──────────────────────── */
  .btn {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    pointer-events: all;
    cursor: pointer;
    transition: transform .08s, box-shadow .08s;
    -webkit-touch-callout: none;
  }
  .btn:active { transform: scale(0.88); }

  /* ── FACE BUTTONS (right cluster) ─────────────── */
  .face-cluster {
    position: absolute;
    width: 148px; height: 148px;
    right: 20px;
    bottom: 108px;
  }
  .face-btn {
    width: 44px; height: 44px;
    border: 2px solid;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
  }

  #btn-cross    { bottom:0; left:50%; transform:translateX(-50%); border-color:var(--cross);    color:var(--cross);    box-shadow:0 0 12px rgba(91,156,246,.35); }
  #btn-circle   { right:0; top:50%;  transform:translateY(-50%); border-color:var(--circle);   color:var(--circle);   box-shadow:0 0 12px rgba(240,98,146,.35); }
  #btn-square   { left:0;  top:50%;  transform:translateY(-50%); border-color:var(--square);   color:var(--square);   box-shadow:0 0 12px rgba(229,126,240,.35); }
  #btn-triangle { top:0;   left:50%; transform:translateX(-50%); border-color:var(--triangle); color:var(--triangle); box-shadow:0 0 12px rgba(93,222,144,.35); }

  #btn-cross:active    { background:rgba(91,156,246,.20); }
  #btn-circle:active   { background:rgba(240,98,146,.20); }
  #btn-square:active   { background:rgba(229,126,240,.20); }
  #btn-triangle:active { background:rgba(93,222,144,.20); }

  /* ── D-PAD ─────────────────────────────────────── */
  .dpad-wrap {
    position: absolute;
    left: 20px;
    bottom: 108px;
    width: 128px; height: 128px;
  }
  .dpad-arm {
    position: absolute;
    background: var(--surface);
    border: 1.5px solid var(--rim);
    display: flex; align-items: center; justify-content: center;
    pointer-events: all;
    cursor: pointer;
    transition: background .08s;
    color: var(--dpad);
    font-size: 14px;
  }
  .dpad-arm:active { background: rgba(255,255,255,0.14); }

  #dpad-up    { top:0;   left:50%; transform:translateX(-50%); width:40px; height:42px; border-radius:6px 6px 0 0; }
  #dpad-down  { bottom:0;left:50%; transform:translateX(-50%); width:40px; height:42px; border-radius:0 0 6px 6px; }
  #dpad-left  { left:0;  top:50%;  transform:translateY(-50%); width:42px; height:40px; border-radius:6px 0 0 6px; }
  #dpad-right { right:0; top:50%;  transform:translateY(-50%); width:42px; height:40px; border-radius:0 6px 6px 0; }

  /* center nub */
  .dpad-center {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:40px; height:40px;
    background:var(--surface);
    border:1.5px solid var(--rim);
    border-radius:4px;
    pointer-events:none;
  }

  /* ── ANALOG STICKS ─────────────────────────────── */
  /*  Left stick: low-left (thumbs rest here naturally)
      Right stick: low-right, above face cluster       */
  .stick-zone {
    position: absolute;
    pointer-events: all;
  }
  .stick-base {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #1e2230, #12141c);
    border: 2px solid var(--rim);
    box-shadow: inset 0 2px 8px rgba(0,0,0,.6), 0 0 0 6px rgba(255,255,255,.03);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .stick-knob {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #3a3f52, #1c1f2b);
    border: 1.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 3px 10px rgba(0,0,0,.8);
    position: absolute;
    transition: transform .06s;
    cursor: grab;
  }
  .stick-label {
    position: absolute;
    bottom: -18px;
    left: 50%; transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: .12em;
    color: var(--text);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
  }

  #stick-left-zone  { left: 68px;  bottom: 24px; }
  #stick-right-zone { right: 152px; bottom: 24px; }

  /* ── SHOULDER BUTTONS ──────────────────────────── */
  /* L1/R1 – flat bars at top corners */
  .shoulder {
    position: absolute;
    top: 0;
    background: var(--surface);
    border: 1.5px solid var(--rim);
    border-radius: 6px;
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--label);
    letter-spacing: .1em;
    transition: background .08s;
    cursor: pointer;
  }
  .shoulder:active { background: rgba(0,198,255,.12); color: var(--accent); }

  #btn-l1 { left:  8px; width: 80px; height: 32px; }
  #btn-r1 { right: 8px; width: 80px; height: 32px; }

  /* L2/R2 – triggers, taller */
  .trigger {
    position: absolute;
    top: 36px;
    background: linear-gradient(180deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.04) 100%);
    border: 1.5px solid var(--rim);
    border-radius: 8px 8px 14px 14px;
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--label);
    letter-spacing: .1em;
    transition: background .08s, transform .06s;
    cursor: pointer;
  }
  .trigger:active {
    background: rgba(0,198,255,.15);
    color: var(--accent);
    transform: scaleY(0.93);
    transform-origin: top center;
  }

  #btn-l2 { left:  8px; width: 80px; height: 44px; }
  #btn-r2 { right: 8px; width: 80px; height: 44px; }

  /* ── CENTER BUTTONS ────────────────────────────── */
  .center-cluster {
    position: absolute;
    bottom: 180px;
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
  }
  .center-btn {
    width: 36px; height: 22px;
    border-radius: 11px;
    background: var(--surface);
    border: 1.5px solid var(--rim);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    letter-spacing: .08em;
    cursor: pointer;
    transition: background .08s;
  }
  .center-btn:active { background: rgba(0,198,255,.15); color: var(--accent); }

  #btn-share   { }
  #btn-options { }

  /* PS Button */
  #btn-ps {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #2a2d3a, #15171f);
    border: 2px solid var(--accent);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 16px var(--btn-glow);
    transition: box-shadow .1s;
  }
  #btn-ps:active { box-shadow: 0 0 28px rgba(0,198,255,.6); }
  #btn-ps svg { width:16px; height:16px; fill: var(--accent); }

  /* Touchpad */
  #btn-touchpad {
    width: 72px; height: 42px;
    border-radius: 10px;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,.14);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .08s;
    position: absolute;
    bottom: 220px;
    left: 50%; transform: translateX(-50%);
  }
  #btn-touchpad span {
    font-size: 8px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  #btn-touchpad:active { background: rgba(255,255,255,.10); }

  /* ── OPACITY TOGGLE ────────────────────────────── */
  #opacity-toggle {
    position: fixed;
    top: 12px; right: 12px;
    background: rgba(255,255,255,.07);
    border: 1px solid var(--rim);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    letter-spacing: .1em;
    cursor: pointer;
    pointer-events: all;
    z-index: 99;
    text-transform: uppercase;
    transition: background .1s;
  }
  #opacity-toggle:active { background: rgba(255,255,255,.14); }

  /* ── RIPPLE ────────────────────────────────────── */
  .ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(0,198,255,.35);
    pointer-events: none;
    animation: ripple-out .4s ease-out forwards;
    z-index: 999;
  }
  @keyframes ripple-out {
    from { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%) scale(0); }
    to   { width: 60px; height: 60px; opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }

  /* ── FADE UTILITY ──────────────────────────────── */
  #controller.faded { opacity: 0.4; }
</style>
</head>
<body>

<!-- Game viewport placeholder -->
<div id="game-area">
  <span id="screen-label">Game Output</span>
</div>

<!-- Opacity hint -->
<div id="opacity-toggle">Fade</div>

<!-- Controller overlay -->
<div id="controller">

  <!-- Shoulder row -->
  <div id="btn-l2" class="trigger">L2</div>
  <div id="btn-r2" class="trigger">R2</div>
  <div id="btn-l1" class="shoulder">L1</div>
  <div id="btn-r1" class="shoulder">R1</div>

  <!-- Touchpad -->
  <div id="btn-touchpad"><span>Touchpad</span></div>

  <!-- Center cluster -->
  <div class="center-cluster">
    <div id="btn-share"   class="center-btn">Share</div>
    <div id="btn-ps">
      <!-- PS logo (simplified) -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 4v13.2l3 1V7.8c0-.55.42-.76.94-.48l.06.04V19.6l3.4 1.1V5.2c-2.1-.7-4.7-1.4-7.4-1.2zM3 18.1l3.5 1.3V17l-3.5-1.2v2.3zm14.6-3.5c-1.1-.35-2.35-.32-3.45.05l-.75.28v2.1l2.1-.72c.7-.24 1.4-.2 2 .1l3.5 1.4V15.6l-3.4-1z"/>
      </svg>
    </div>
    <div id="btn-options" class="center-btn">Options</div>
  </div>

  <!-- D-Pad -->
  <div class="dpad-wrap">
    <div id="dpad-up"    class="dpad-arm">▲</div>
    <div id="dpad-left"  class="dpad-arm">◀</div>
    <div class="dpad-center"></div>
    <div id="dpad-right" class="dpad-arm">▶</div>
    <div id="dpad-down"  class="dpad-arm">▼</div>
  </div>

  <!-- Face buttons -->
  <div class="face-cluster">
    <div id="btn-cross"    class="btn face-btn">✕</div>
    <div id="btn-circle"   class="btn face-btn">○</div>
    <div id="btn-square"   class="btn face-btn">□</div>
    <div id="btn-triangle" class="btn face-btn">△</div>
  </div>

  <!-- Left analog stick -->
  <div id="stick-left-zone" class="stick-zone">
    <div class="stick-base">
      <div class="stick-knob" id="stick-left-knob"></div>
    </div>
    <div class="stick-label">L3</div>
  </div>

  <!-- Right analog stick -->
  <div id="stick-right-zone" class="stick-zone">
    <div class="stick-base">
      <div class="stick-knob" id="stick-right-knob"></div>
    </div>
    <div class="stick-label">R3</div>
  </div>

</div>

<script>
/* ── Ripple effect on any button press ─────────── */
document.querySelectorAll('.btn, .face-btn, .dpad-arm, .shoulder, .trigger, .center-btn, #btn-ps, #btn-touchpad').forEach(el => {
  el.addEventListener('pointerdown', e => {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = e.clientX + 'px';
    r.style.top  = e.clientY + 'px';
    document.body.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  });
});

/* ── Analog stick drag ─────────────────────────── */
function makeStick(zoneId, knobId) {
  const zone = document.getElementById(zoneId);
  const knob = document.getElementById(knobId);
  const base = zone.querySelector('.stick-base');
  const maxR = 18;
  let active = false, cx = 0, cy = 0;

  base.addEventListener('pointerdown', e => {
    active = true;
    base.setPointerCapture(e.pointerId);
    const r = base.getBoundingClientRect();
    cx = r.left + r.width  / 2;
    cy = r.top  + r.height / 2;
  });

  base.addEventListener('pointermove', e => {
    if (!active) return;
    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > maxR) { dx *= maxR/dist; dy *= maxR/dist; }
    knob.style.transform = `translate(${dx}px,${dy}px)`;
  });

  const release = () => {
    if (!active) return;
    active = false;
    knob.style.transform = '';
  };
  base.addEventListener('pointerup',     release);
  base.addEventListener('pointercancel', release);
}

makeStick('stick-left-zone',  'stick-left-knob');
makeStick('stick-right-zone', 'stick-right-knob');

/* ── Fade toggle ───────────────────────────────── */
const toggle = document.getElementById('opacity-toggle');
const ctrl   = document.getElementById('controller');
toggle.addEventListener('click', () => ctrl.classList.toggle('faded'));
</script>
</body>
</html>
